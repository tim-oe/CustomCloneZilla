# =============================================================================
# CustomCloneZilla - Configuration File
#
# The script has built-in defaults for every setting.
# This file is an OVERRIDE file — uncomment and change only what differs
# from those defaults.  Anything left commented out uses the script default.
#
# Usage:
#   ./build-iso.sh --config config/settings.conf
#   make restore CONFIG=config/settings.conf
# =============================================================================


# -----------------------------------------------------------------------------
# Clonezilla ISO Source
# -----------------------------------------------------------------------------

#CLONEZILLA_VERSION=""                # default: auto-set from arch (see below)
#CLONEZILLA_ARCH="amd64"              # default: amd64  (also: arm64)
                                      # amd64: stable builds from SourceForge
                                      # arm64: experimental builds from NCHC mirror
                                      #   https://free.nchc.org.tw/clonezilla-live/experimental/arm/
#CLONEZILLA_AMD64_VERSION="3.3.1-35"  # default: latest stable amd64 release
#CLONEZILLA_ARM64_VERSION="3.3.2-21"  # default: latest experimental arm64 release
#CLONEZILLA_DOWNLOAD_URL=""           # default: auto-computed from arch + version
#LOCAL_ISO=""                         # default: download to build/; set to use a local file
#OUTPUT_ISO=""                        # default: build/custom-clonezilla.iso


# -----------------------------------------------------------------------------
# Locale / Input
# -----------------------------------------------------------------------------

#LANGUAGE="en_US.UTF-8"    # default: en_US.UTF-8
#KEYBOARD_LAYOUT="us"      # default: us
#KEYBOARD_VARIANT=""        # default: (none)
#TIMEZONE="America/Chicago" # default: America/Chicago


# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------

#NETWORK_DHCP="true"        # default: true   (set to false to skip ip=dhcp)
#NETWORK_INTERFACE=""        # default: (all interfaces)
                             # Set to a specific interface name (e.g. eth0) to
                             # restrict DHCP to that interface: ip=eth0:dhcp


# -----------------------------------------------------------------------------
# NFS Share
#
# Uncomment and set NFS_SERVER + NFS_SHARE to mount the share at boot.
# Required for backup/restore modes; optional for interactive mode.
# -----------------------------------------------------------------------------

#NFS_SERVER="192.168.1.30"
#NFS_SHARE="/mnt/main/backup/system"

#NFS_OPTS="defaults"        # default: defaults
#NFS_VERSION="4"            # default: 4  (also: 3)
#NFS_WAIT_SEC="15"          # default: 15


# -----------------------------------------------------------------------------
# Local Device (USB) Repository
#
# Alternative to NFS: detect a removable USB drive at boot and mount it as
# the Clonezilla image repository.  Requires --usb-repo-detect (or the setting
# below).  A small detection script is injected into the ISO at build time and
# invoked via ocs_prerun before Clonezilla starts.
#
# Recommended workflow for Raspberry Pi 5:
#   1. Format a USB drive with a single partition labeled "CZ_IMAGES" (FAT32
#      or ext4) and copy your Clonezilla image folders onto it.
#   2. Build the ISO with these settings:
#        CLONEZILLA_ARCH="arm64"
#        USB_REPO_DETECT="true"
#        USB_REPO_LABEL="CZ_IMAGES"
#        CZ_DISK="nvme0n1"           # Pi 5 NVMe via M.2 HAT+; use mmcblk0 for SD
#        CZ_MODE="restore"
#   3. Write the ISO to a second USB drive (or SD card) and boot the Pi from it.
#      The detection script mounts the CZ_IMAGES drive automatically.
#
# If both NFS and USB_REPO_DETECT are configured, NFS prerun commands run first
# (prerun 1-4); USB detection appends as the next prerun and exits silently if
# NFS already owns /home/partimag.
# -----------------------------------------------------------------------------

#USB_REPO_DETECT="false"    # default: false  (set to true to enable)
#USB_REPO_LABEL=""          # default: (any removable device)
                             # Set to a volume label (e.g. CZ_IMAGES) to
                             # restrict detection to a specific drive.


# -----------------------------------------------------------------------------
# Clonezilla Operation
# (only applies when NFS_SERVER/NFS_SHARE or USB_REPO_DETECT are set)
#
# Raspberry Pi 5 disk names:
#   nvme0n1   — NVMe SSD via M.2 HAT+ (PCIe)
#   mmcblk0   — built-in SD card slot
#   sda       — USB storage device
# -----------------------------------------------------------------------------

#CZ_MODE="interactive"           # default: interactive  (also: backup, restore)
#CZ_DISK="sda"                   # default: sda  (Pi 5 NVMe: nvme0n1)
#CZ_IMAGE_NAME="clonezilla-img"  # default: clonezilla-img
#CZ_COMPRESS="z1p"               # default: z1p  (z0=none z1p=gzip z2p=bzip2 z3p=lzop z4p=lzma z5p=xz)
#CZ_POST_ACTION="reboot"         # default: reboot  (also: poweroff, choose)
#CZ_EXTRA_ARGS=""                # default: (none)  extra flags appended to ocs-sr
